name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-runtime.txt pyinstaller

      - name: Build EXE (onefile, windowed, no console)
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name jiaoyisuopiliang --collect-submodules eth_account --collect-submodules eth_utils main.py

      - name: Package single EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $exeName = "jiaoyisuopiliang-${{ github.ref_name }}-windows-x64.exe"
          $zipName = "jiaoyisuopiliang-${{ github.ref_name }}-windows-x64.zip"
          Copy-Item "dist/jiaoyisuopiliang.exe" "release/$exeName"
          Compress-Archive -Path "release/$exeName" -DestinationPath "release/$zipName" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: jiaoyisuopiliang-windows
          path: release/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = Get-ChildItem "release/*" | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --generate-notes
          }
