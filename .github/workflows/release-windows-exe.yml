name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE (windowed, no console)
        run: |
          pyinstaller --noconfirm --clean --windowed --name jiaoyisuopiliang main.py

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $zipName = "jiaoyisuopiliang-${{ github.ref_name }}-windows-x64.zip"
          Compress-Archive -Path "dist/jiaoyisuopiliang/*" -DestinationPath "release/$zipName" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiaoyisuopiliang-windows
          path: release/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.zip
